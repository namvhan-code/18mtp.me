<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18mtp.me Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #FFD8F5 0%, #D6E283 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes float-left-right {
            0%, 100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(15px) rotate(-10deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash {
            animation: dash-animation 1s linear infinite;
        }

        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(255, 191, 134, 0.3), 
                        inset 0 2px 10px rgba(255, 255, 255, 0.5);
        }

        .virtual-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .virtual-card:hover {
            transform: translateY(-4px);
        }
        .virtual-card:active {
            transform: translateY(2px) scale(0.98);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            pink: '#FFD8F5',
                            lime: '#D6E283',
                            orange: '#FFBF86',
                            blue: '#B5DAFF',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-gray-700 relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-brand-orange anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <svg class="absolute top-[15%] left-[2%] w-6 h-6 text-white/60 anim-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="absolute top-[8%] left-[25%] w-4 h-4 text-brand-blue/50 anim-float-3" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
        <svg class="absolute top-[10%] right-[8%] w-10 h-10 text-brand-lime anim-float-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800/95 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm">

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">

        <div class="glass-card rounded-[40px] p-3 relative z-10">

        </div>
    </div>

    <script>
        function copyText(text, containerElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2000);
