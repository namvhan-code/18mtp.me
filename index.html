<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18mtp.me Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #FFD8F5 0%, #D6E283 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 1); }
        .virtual-card { transition: all 0.3s ease; cursor: pointer; }
        .virtual-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="flex flex-col items-center py-6 px-4 text-gray-700">

    <div class="max-w-[420px] w-full space-y-5">
        <div class="text-center pt-2">
            <h1 class="text-2xl font-bold text-gray-800">18mtp.me</h1>
            <p class="text-sm text-gray-500">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-4">
            <div class="rounded-[28px] overflow-hidden border-[4px] border-white shadow-sm">
                <img src="https://lh3.googleusercontent.com/d/1gFrSLd8mvChYIXvSmLTYLziBA8kYXUyo" alt="QR Code" class="w-full h-auto object-cover">
            </div>

            <div class="p-4 space-y-5">
                <div class="text-center">
                    <p class="text-[15px] font-medium">ชื่อบัญชี <span class="text-orange-500 font-bold bg-orange-50 px-2 py-0.5 rounded-lg border border-orange-100">มุขตาภา นิยม</span></p>
                </div>

                <div class="space-y-4">
                    <div class="virtual-card bg-green-500 rounded-[24px] p-5 shadow-lg text-white" onclick="copyText('1521373489')">
                        <div class="font-bold">กสิกรไทย</div>
                        <div class="text-2xl font-bold tracking-widest">1521373489</div>
                    </div>

                    <div class="virtual-card bg-red-500 rounded-[24px] p-5 shadow-lg text-white" onclick="copyText('0822571488')">
                        <div class="font-bold">TrueMoney Wallet</div>
                        <div class="text-2xl font-bold tracking-widest">0822571488</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("คัดลอกเลขบัญชีแล้ว: " + text);
        }
    </script>
</body>
</html>
