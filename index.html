<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18mtp.me Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #FFEDF7 0%, #E3F2FD 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes float-left-right { 0%, 100% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(15px) rotate(-10deg); } }
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        
        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(181, 218, 255, 0.3);
        }

        .virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .virtual-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="flex flex-col items-center py-6 px-4 text-gray-700 relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-pink-300 anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <svg class="absolute top-[15%] left-[2%] w-6 h-6 text-blue-300 anim-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="absolute top-[10%] right-[8%] w-10 h-10 text-pink-300 anim-float-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-blue-500/90 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 font-medium text-sm">
        คัดลอกเลขบัญชีแล้ว
    </div>

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        <div class="text-center pt-2 pb-2">
            <h1 class="text-2xl font-bold text-gray-800">18mtp.me</h1>
            <p class="text-sm font-medium text-gray-500 mt-1">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-3">
            <div class="rounded-[28px] overflow-hidden border-[4px] border-white shadow-sm">
                <img src="https://lh3.googleusercontent.com/d/1gFrSLd8mvChYIXvSmLTYLziBA8kYXUyo" alt="QR Code" class="w-full h-auto object-cover">
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center">
                    <p class="text-[15px] font-medium text-gray-700">
                        ชื่อบัญชี <span class="text-blue-500 font-bold bg-blue-50 px-2 py-0.5 rounded-lg border border-blue-100">มุขตาภา นิยม</span>
                    </p>
                </div>

                <div class="space-y-4">
                    <div class="virtual-card bg-gradient-to-br from-blue-400 to-blue-500 rounded-[24px] p-5 shadow-lg text-white" onclick="copyText('1521373489')">
                        <div class="flex justify-between mb-2"><span class="font-bold">กสิกรไทย</span><span class="text-xs bg-white/20 px-2 py-1 rounded-full">คลิกเพื่อคัดลอก</span></div>
                        <div class="text-2xl font-bold tracking-widest">1521373489</div>
                    </div>

                    <div class="virtual-card bg-gradient-to-br from-pink-400 to-pink-500 rounded-[24px] p-5 shadow-lg text-white" onclick="copyText('0822571488')">
                        <div class="flex justify-between mb-2"><span class="font-bold">TrueMoney Wallet</span><span class="text-xs bg-white/20 px-2 py-1 rounded-full">คลิกเพื่อคัดลอก</span></div>
                        <div class="text-2xl font-bold tracking-widest">0822571488</div>
                    </div>

                    <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 text-[13px] text-gray-700 space-y-2">
                        <p class="font-bold text-blue-600">⚠ โอน Wallet ไม่บวกเพิ่มคับ</p>
                        <p>⚠ โอนผิด โอนใหม่ ไม่โอนคืนงับ</p>
                        <p>รบกวนเช็คชื่อเเละเลขบัญชีให้ดีก่อนโอนน้า</p>
                        <p>โอนเเล้วเเจ้งสลิปด้วยนะคะ</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2000);
        }
    </script>
</body>
</html>
