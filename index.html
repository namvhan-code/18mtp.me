<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18mtp.me Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #FFD8F5 0%, #D6E283 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash { animation: dash-animation 1s linear infinite; }
        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(255, 191, 134, 0.3);
        }

        .virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .virtual-card:hover { transform: translateY(-4px); }
        
        ::-webkit-scrollbar { width: 0px; }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brown: { 500: '#FFBF86', 600: '#4a4a4a' },
                        pink: { 400: '#FFBF86', 500: '#FFBF86' }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-[#FFBF86] anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-[#FFBF86]/95 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 z-50">
        คัดลอกข้อมูลแล้ว
    </div>

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        
        <div class="text-center pt-2 pb-2">
            <h1 class="text-2xl font-bold text-[#FFBF86]">18mtp.me</h1>
        </div>

        <div class="glass-card rounded-[40px] p-3 relative z-10">
            <div class="relative p-2 rounded-[36px]">
                <svg class="absolute inset-0 w-full h-full pointer-events-none">
                    <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#FFBF86" stroke-width="2.5" stroke-dasharray="12 12" class="animate-dash" />
                </svg>
                <div class="rounded-[28px] overflow-hidden border-[4px] border-white">
                    <img src="3082_20260625155100.png" alt="Payment QR" class="w-full h-auto">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center">
                    <p class="font-bold text-gray-700">ชื่อบัญชี: มุขตาภา นิยม</p>
                </div>

                <div class="space-y-4">
                    <div class="virtual-card bg-[#B5DAFF] rounded-[24px] p-5 shadow-lg cursor-pointer" onclick="copyText('1521373489', this)">
                        <div class="flex justify-between items-center text-white">
                            <span class="font-bold">กสิกรไทย</span>
                            <span class="text-xs bg-white/30 px-3 py-1 rounded-full">คัดลอก</span>
                        </div>
                        <div class="text-white font-bold text-2xl mt-2 tracking-widest">1521373489</div>
                    </div>

                    <div class="virtual-card bg-[#D6E283] rounded-[24px] p-5 shadow-lg cursor-pointer" onclick="copyText('0822571488', this)">
                        <div class="flex justify-between items-center text-white">
                            <span class="font-bold">TrueMoney Wallet</span>
                            <span class="text-xs bg-white/30 px-3 py-1 rounded-full">คัดลอก</span>
                        </div>
                        <div class="text-white font-bold text-2xl mt-2 tracking-widest">0822571488</div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-red-50 border-2 border-red-200 rounded-2xl p-3 text-[11px] text-red-600 font-bold">
                            ⚠ โอนผิด โอนใหม่<br>ไม่โอนคืนงับ
                        </div>
                        <div class="bg-orange-50 border-2 border-orange-200 rounded-2xl p-3 text-[11px] text-orange-600 font-bold">
                            ✅ โอน Wallet<br>ไม่บวกเพิ่มคับ!
                        </div>
                    </div>
                    
                    <div class="bg-pink-50 border border-pink-100 rounded-2xl p-3 text-[12px] text-gray-600">
                        * รบกวนเช็คชื่อและเลขบัญชีให้ดีก่อนโอน และเเจ้งสลิปด้วยนะคะ
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, el) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);
        }
    </script>
</body>
</html>
